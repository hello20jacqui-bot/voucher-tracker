<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#1F5C4A">
<meta name="robots" content="noindex, nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vouchers">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<title>Voucher Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --color-bg:#F3F6F1;
    --color-paper:#FFFFFF;
    --color-ink:#1A1D1B;
    --color-ink-soft:#5B6660;
    --color-primary:#1F5C4A;
    --color-primary-dark:#153F33;
    --color-new:#4C6685;
    --color-inuse:#1F5C4A;
    --color-expired:#A24936;
    --color-border:#DEE4D9;
    --font-display:'Space Grotesk',sans-serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'IBM Plex Mono',monospace;
    --radius:16px;
    --shadow:0 2px 10px rgba(20,30,25,0.07),0 1px 2px rgba(20,30,25,0.06);
    --safe-top:env(safe-area-inset-top);
    --safe-bottom:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--color-bg);color:var(--color-ink);font-family:var(--font-body);-webkit-font-smoothing:antialiased;}
  body{min-height:100vh;min-height:100dvh;}
  h1,h2,h3{font-family:var(--font-display);margin:0;letter-spacing:-0.01em;}
  p{margin:0;}
  button{font-family:inherit;cursor:pointer;}
  input,select{font-family:inherit;}
  .tabular{font-variant-numeric:tabular-nums;}
  ::selection{background:var(--color-primary);color:#fff;}

  #app{max-width:520px;margin:0 auto;padding-bottom:calc(96px + var(--safe-bottom));min-height:100vh;min-height:100dvh;position:relative;}

  /* ---------- Header ---------- */
  .topbar{position:sticky;top:0;z-index:20;background:var(--color-bg);padding:calc(18px + var(--safe-top)) 20px 12px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .topbar h1{font-size:22px;font-weight:700;}
  .topbar-actions{display:flex;align-items:center;gap:6px;}
  .icon-btn{width:38px;height:38px;border-radius:11px;border:1px solid var(--color-border);background:var(--color-paper);display:flex;align-items:center;justify-content:center;color:var(--color-ink);box-shadow:var(--shadow);}
  .icon-btn:active{transform:scale(0.94);}
  .icon-btn svg{width:18px;height:18px;}
  .sync-row{display:flex;align-items:center;gap:6px;padding:0 20px 14px;font-family:var(--font-mono);font-size:11.5px;color:var(--color-ink-soft);}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--color-ink-soft);flex-shrink:0;}
  .sync-dot.synced{background:var(--color-primary);}
  .sync-dot.syncing{background:#C99A2E;animation:pulse 1s infinite ease-in-out;}
  .sync-dot.error{background:var(--color-expired);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}

  .summary{padding:0 20px 18px;font-size:13.5px;color:var(--color-ink-soft);}
  .summary b{color:var(--color-ink);font-family:var(--font-mono);font-weight:600;}

  /* ---------- Store grouping ---------- */
  .store-group{margin-bottom:8px;}
  .store-group-header{display:flex;align-items:baseline;justify-content:space-between;padding:16px 20px 10px;}
  .store-group-header h3{font-family:var(--font-display);font-size:15px;font-weight:700;}
  .store-group-header .sub{font-family:var(--font-mono);font-size:11px;color:var(--color-ink-soft);white-space:nowrap;}
  .vc-store{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--color-ink-soft);margin-bottom:3px;}

  /* ---------- Voucher card (ticket) ---------- */
  .list{padding:0 20px;display:flex;flex-direction:column;gap:16px;}
  .voucher-card{background:var(--color-paper);border:1px solid var(--color-border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;position:relative;overflow:hidden;text-align:left;width:100%;}
  .voucher-card::before,.voucher-card::after{content:'';position:absolute;width:20px;height:20px;background:var(--color-bg);border-radius:50%;top:50%;transform:translateY(-50%);border:1px solid var(--color-border);}
  .voucher-card::before{left:-11px;}
  .voucher-card::after{right:-11px;}
  .vc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px;}
  .vc-label{font-family:var(--font-display);font-weight:600;font-size:15.5px;}
  .vc-sub{font-family:var(--font-mono);font-size:11.5px;color:var(--color-ink-soft);margin-top:2px;}
  .stamp{display:inline-block;padding:4px 9px;border-radius:5px;font-family:var(--font-mono);font-weight:700;font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;transform:rotate(-4deg);border:2px solid currentColor;white-space:nowrap;}
  .stamp.new{color:var(--color-new);}
  .stamp.inuse{color:var(--color-inuse);}
  .stamp.expired{color:var(--color-expired);}
  .vc-divider{border-top:2px dashed var(--color-border);margin:0 -20px 14px;}
  .vc-bottom{display:flex;justify-content:space-between;align-items:flex-end;}
  .vc-balance-label{font-size:11px;color:var(--color-ink-soft);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:2px;}
  .vc-balance{font-family:var(--font-mono);font-weight:700;font-size:30px;color:var(--color-primary-dark);}
  .voucher-card.is-expired .vc-balance{color:var(--color-ink-soft);}
  .vc-initial{font-family:var(--font-mono);font-size:12.5px;color:var(--color-ink-soft);}

  .empty{margin:40px 20px;padding:34px 22px;background:var(--color-paper);border:1px dashed var(--color-border);border-radius:var(--radius);text-align:center;}
  .empty h2{font-size:17px;margin-bottom:8px;}
  .empty p{font-size:13.5px;color:var(--color-ink-soft);line-height:1.5;margin-bottom:18px;}

  /* ---------- Buttons ---------- */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:12px;border:none;padding:13px 18px;font-weight:600;font-size:14.5px;font-family:var(--font-body);}
  .btn-primary{background:var(--color-primary);color:#fff;}
  .btn-primary:active{background:var(--color-primary-dark);}
  .btn-secondary{background:var(--color-paper);color:var(--color-ink);border:1px solid var(--color-border);}
  .btn-danger{background:#fff;color:var(--color-expired);border:1px solid #E7C6BC;}
  .btn-block{width:100%;}
  .btn:disabled{opacity:0.55;}

  .fab{position:fixed;right:20px;bottom:calc(22px + var(--safe-bottom));width:58px;height:58px;border-radius:50%;background:var(--color-primary);color:#fff;border:none;box-shadow:0 6px 18px rgba(31,92,74,0.38);display:flex;align-items:center;justify-content:center;z-index:30;}
  .fab:active{transform:scale(0.95);}
  .fab svg{width:26px;height:26px;}

  /* ---------- Forms ---------- */
  .screen{padding:4px 20px 40px;}
  .field{margin-bottom:18px;}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--color-ink-soft);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.4px;}
  .field input[type=text],.field input[type=number],.field input[type=date],.field input[type=password]{
    width:100%;padding:13px 14px;border-radius:11px;border:1px solid var(--color-border);background:var(--color-paper);font-size:16px;color:var(--color-ink);font-family:var(--font-mono);
  }
  .field input:focus,.field select:focus{outline:2px solid var(--color-primary);outline-offset:1px;}
  .field .hint{font-size:12px;color:var(--color-ink-soft);margin-top:6px;font-family:var(--font-body);}
  .field-row{display:flex;gap:12px;}
  .field-row .field{flex:1;}
  .pin-wrap{position:relative;}
  .pin-toggle{position:absolute;right:8px;top:8px;bottom:8px;padding:0 10px;border:none;background:transparent;color:var(--color-primary);font-weight:600;font-size:12px;font-family:var(--font-body);}
  .photo-input{border:1.5px dashed var(--color-border);border-radius:12px;padding:16px;text-align:center;background:var(--color-paper);}
  .photo-input img{max-width:100%;max-height:200px;border-radius:8px;margin-bottom:10px;display:block;margin-left:auto;margin-right:auto;}
  .photo-input .pick-btn{margin-top:6px;}
  .form-actions{display:flex;gap:10px;margin-top:26px;}
  .back-row{display:flex;align-items:center;gap:8px;padding:14px 20px 6px;}
  .back-row .icon-btn{box-shadow:none;}
  .back-row h2{font-size:18px;}

  /* ---------- Detail / checkout ---------- */
  .barcode-frame{background:#fff;border:1px solid var(--color-border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);text-align:center;}
  .barcode-frame img{max-width:100%;max-height:150px;object-fit:contain;}
  .barcode-frame .tap-hint{font-size:11.5px;color:var(--color-ink-soft);margin-top:10px;}
  .detail-balance{text-align:center;margin:26px 0 22px;}
  .detail-balance .label{font-size:12px;text-transform:uppercase;letter-spacing:0.6px;color:var(--color-ink-soft);margin-bottom:4px;}
  .detail-balance .amount{font-family:var(--font-mono);font-weight:700;font-size:44px;color:var(--color-primary-dark);}
  .detail-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px dashed var(--color-border);font-size:14px;}
  .detail-row:last-child{border-bottom:none;}
  .detail-row .k{color:var(--color-ink-soft);}
  .detail-row .v{font-family:var(--font-mono);font-weight:600;}

  .ledger{margin-top:24px;}
  .ledger h3{font-size:13px;text-transform:uppercase;letter-spacing:0.5px;color:var(--color-ink-soft);margin-bottom:10px;}
  .ledger-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px dashed var(--color-border);gap:8px;}
  .ledger-row .date{font-family:var(--font-mono);font-size:13px;width:64px;flex-shrink:0;}
  .ledger-row .spent{font-family:var(--font-mono);font-size:13px;color:var(--color-expired);flex:1;}
  .ledger-row .after{font-family:var(--font-mono);font-size:13px;font-weight:600;text-align:right;width:78px;flex-shrink:0;}
  .ledger-row .del{border:none;background:transparent;color:var(--color-ink-soft);font-size:16px;padding:2px 6px;flex-shrink:0;}
  .ledger-empty{font-size:13px;color:var(--color-ink-soft);padding:14px 0;}

  .add-txn{margin-top:22px;background:var(--color-paper);border:1px solid var(--color-border);border-radius:var(--radius);padding:16px;}
  .add-txn h3{font-size:13px;text-transform:uppercase;letter-spacing:0.5px;color:var(--color-ink-soft);margin-bottom:12px;}

  /* ---------- Checkout fullscreen overlay ---------- */
  .overlay{position:fixed;inset:0;background:#fff;z-index:100;display:flex;flex-direction:column;padding:calc(18px + var(--safe-top)) 22px calc(28px + var(--safe-bottom));}
  .overlay-close{align-self:flex-end;width:36px;height:36px;border-radius:50%;border:1px solid var(--color-border);background:#fff;display:flex;align-items:center;justify-content:center;}
  .overlay-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;}
  .overlay-body img{max-width:100%;max-height:38vh;object-fit:contain;}
  .overlay-label{font-family:var(--font-display);font-weight:600;font-size:16px;color:var(--color-ink);}
  .overlay-balance{font-family:var(--font-mono);font-weight:700;font-size:38px;color:var(--color-primary-dark);}
  .overlay-pin{display:flex;align-items:center;gap:10px;font-family:var(--font-mono);font-size:22px;letter-spacing:3px;}
  .overlay-pin button{border:1px solid var(--color-border);background:#fff;border-radius:8px;padding:6px 12px;font-size:12px;font-family:var(--font-body);color:var(--color-primary);}

  /* ---------- Settings / onboarding ---------- */
  .card{background:var(--color-paper);border:1px solid var(--color-border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);}
  .lead{font-size:14px;color:var(--color-ink-soft);line-height:1.55;margin-bottom:20px;}
  .steps{margin:0 0 20px;padding:0;list-style:none;display:flex;flex-direction:column;gap:10px;}
  .steps li{display:flex;gap:10px;font-size:13.5px;color:var(--color-ink-soft);line-height:1.5;}
  .steps li b{color:var(--color-ink);font-family:var(--font-mono);}
  .advanced-toggle{border:none;background:transparent;color:var(--color-primary);font-weight:600;font-size:12.5px;padding:6px 0;}

  /* ---------- Toast ---------- */
  .toast{position:fixed;left:20px;right:20px;bottom:calc(24px + var(--safe-bottom));z-index:200;background:var(--color-ink);color:#fff;padding:13px 16px;border-radius:12px;font-size:13.5px;box-shadow:0 8px 24px rgba(0,0,0,0.25);animation:toast-in 0.18s ease-out;}
  .toast.error{background:var(--color-expired);}
  @keyframes toast-in{from{transform:translateY(8px);opacity:0;}to{transform:translateY(0);opacity:1;}}

  @media (prefers-reduced-motion:reduce){*{animation-duration:0.001ms !important;}}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
'use strict';

var GH_API='https://api.github.com';
var CONFIG_KEY='voucherTrackerConfig_v1';
var CACHE_KEY='voucherTrackerCache_v1';

var state={
  view:'dashboard',
  config:null,
  vouchers:[],
  sha:null,
  activeVoucherId:null,
  editingVoucherId:null,
  photoDraft:null,
  syncStatus:'idle',
  syncError:null,
  lastSynced:null,
  checkoutId:null,
  pinRevealed:{}
};

/* ---------------- storage ---------------- */
function loadConfig(){ try{ var raw=localStorage.getItem(CONFIG_KEY); return raw?JSON.parse(raw):null; }catch(e){ return null; } }
function saveConfigLS(cfg){ localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg)); }
function clearConfigLS(){ localStorage.removeItem(CONFIG_KEY); localStorage.removeItem(CACHE_KEY); }
function loadCache(){ try{ var raw=localStorage.getItem(CACHE_KEY); return raw?JSON.parse(raw):null; }catch(e){ return null; } }
function saveCache(dataObj, sha){ try{ localStorage.setItem(CACHE_KEY, JSON.stringify({data:dataObj, sha:sha, cachedAt:Date.now()})); }catch(e){} }
function clone(x){ return typeof structuredClone==='function' ? structuredClone(x) : JSON.parse(JSON.stringify(x)); }

/* ---------------- base64 (unicode-safe) ---------------- */
function b64EncodeUnicode(str){
  return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g,function(_,p1){ return String.fromCharCode(parseInt(p1,16)); }));
}
function b64DecodeUnicode(b64){
  return decodeURIComponent(atob(b64).split('').map(function(c){ return '%'+('0'+c.charCodeAt(0).toString(16)).slice(-2); }).join(''));
}

/* ---------------- GitHub API ---------------- */
function ghGetFile(cfg){
  var url=GH_API+'/repos/'+encodeURIComponent(cfg.owner)+'/'+encodeURIComponent(cfg.repo)+'/contents/'+encodeURIComponent(cfg.path)+(cfg.branch?('?ref='+encodeURIComponent(cfg.branch)):'');
  return fetch(url,{headers:{Authorization:'Bearer '+cfg.token, Accept:'application/vnd.github+json'}}).then(function(res){
    if(res.status===404){ return {data:{vouchers:[]}, sha:null}; }
    if(!res.ok){ return res.json().catch(function(){return {};}).then(function(j){ throw new Error(friendlyGhError(res.status, j.message)); }); }
    return res.json().then(function(json){
      var content=b64DecodeUnicode(json.content.replace(/\n/g,''));
      var parsed;
      try{ parsed=JSON.parse(content); }catch(e){ parsed={vouchers:[]}; }
      if(!parsed.vouchers) parsed.vouchers=[];
      return {data:parsed, sha:json.sha};
    });
  });
}
function ghPutFile(cfg, dataObj, sha, message){
  var url=GH_API+'/repos/'+encodeURIComponent(cfg.owner)+'/'+encodeURIComponent(cfg.repo)+'/contents/'+encodeURIComponent(cfg.path);
  var body={ message: message||'Update vouchers.json', content: b64EncodeUnicode(JSON.stringify(dataObj,null,2)) };
  if(cfg.branch) body.branch=cfg.branch;
  if(sha) body.sha=sha;
  return fetch(url,{method:'PUT', headers:{Authorization:'Bearer '+cfg.token, Accept:'application/vnd.github+json','Content-Type':'application/json'}, body:JSON.stringify(body)}).then(function(res){
    if(res.status===409){ var e=new Error('conflict'); e.conflict=true; throw e; }
    if(!res.ok){ return res.json().catch(function(){return {};}).then(function(j){ throw new Error(friendlyGhError(res.status, j.message)); }); }
    return res.json().then(function(json){ return json.content.sha; });
  });
}
function friendlyGhError(status, detail){
  if(status===401) return 'That access token was rejected. Check it in Settings.';
  if(status===404) return "Can't find that repository — check the owner and repo name in Settings.";
  if(status===403) return 'GitHub blocked the request (rate limit or missing permission).';
  return 'GitHub error ('+status+')'+(detail?': '+detail:'');
}

/* ---------------- domain logic ---------------- */
function round2(n){ return Math.round((Number(n)+Number.EPSILON)*100)/100; }
function uid(){ return (typeof crypto!=='undefined' && crypto.randomUUID) ? crypto.randomUUID() : 'id-'+Date.now()+'-'+Math.random().toString(16).slice(2); }
function fmtMoney(n){ var v=round2(n); return '$'+v.toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(iso){ if(!iso) return ''; var d=new Date(iso+'T00:00:00'); return d.toLocaleDateString('en-AU',{day:'numeric',month:'short'}); }
function relTime(ts){
  if(!ts) return 'never';
  var s=Math.floor((Date.now()-ts)/1000);
  if(s<10) return 'just now';
  if(s<60) return s+'s ago';
  var m=Math.floor(s/60); if(m<60) return m+'m ago';
  var h=Math.floor(m/60); if(h<24) return h+'h ago';
  var d=Math.floor(h/24); return d+'d ago';
}
function getVoucher(id){ for(var i=0;i<state.vouchers.length;i++){ if(state.vouchers[i].id===id) return state.vouchers[i]; } return null; }
function voucherTitle(v){ return (v.label && v.label.trim()) ? v.label.trim() : 'Voucher'; }
function voucherStore(v){ return (v.store && v.store.trim()) ? v.store.trim() : 'Other'; }
function computeVoucher(v){
  var txns=v.transactions.slice().sort(function(a,b){ if(a.date===b.date) return (a.ts||0)-(b.ts||0); return a.date<b.date?-1:1; });
  var cumulative=0, withRunning=[];
  for(var i=0;i<txns.length;i++){
    cumulative=round2(cumulative+Number(txns[i].amount));
    withRunning.push({id:txns[i].id, date:txns[i].date, amount:Number(txns[i].amount), balanceAfter:round2(v.initialValue-cumulative)});
  }
  var balance=round2(v.initialValue-cumulative);
  var status = v.transactions.length===0 ? 'NEW' : (balance<=0 ? 'EXPIRED' : 'IN-USE');
  var ledgerDesc=withRunning.slice().reverse();
  return {spent:cumulative, balance:balance, status:status, ledger:ledgerDesc};
}
function statusRank(s){ return s==='IN-USE'?0:(s==='NEW'?1:2); }
function statusClass(s){ return s==='IN-USE'?'inuse':(s==='NEW'?'new':'expired'); }

/* ---------------- image compression ---------------- */
function compressImage(file, maxWidth, quality){
  return new Promise(function(resolve,reject){
    var reader=new FileReader();
    reader.onerror=function(){ reject(new Error('Could not read that photo.')); };
    reader.onload=function(){
      var img=new Image();
      img.onerror=function(){ reject(new Error('Could not read that photo.')); };
      img.onload=function(){
        var scale=Math.min(1, maxWidth/img.width);
        var w=Math.round(img.width*scale), h=Math.round(img.height*scale);
        var canvas=document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        var ctx=canvas.getContext('2d');
        ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h);
        ctx.drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ---------------- sync ---------------- */
function initialLoad(){
  state.config=loadConfig();
  var cached=loadCache();
  if(cached){ state.vouchers=(cached.data&&cached.data.vouchers)||[]; state.sha=cached.sha; state.lastSynced=cached.cachedAt; }
  if(!state.config){ state.view='settings'; render(); return; }
  render();
  refreshFromRemote(true);
}
function refreshFromRemote(silent){
  if(!state.config) return Promise.resolve();
  state.syncStatus='syncing';
  if(!silent) render();
  return ghGetFile(state.config).then(function(res){
    state.vouchers=res.data.vouchers||[];
    state.sha=res.sha;
    state.syncStatus='synced';
    state.lastSynced=Date.now();
    saveCache(res.data, res.sha);
  }).catch(function(err){
    state.syncStatus='error';
    state.syncError=err.message||'Could not reach GitHub';
    if(!silent) showToast(state.syncError,'error');
  }).then(function(){ render(); });
}
function persist(mutator, message){
  if(!state.config){ showToast('Connect to GitHub in Settings first.','error'); return Promise.resolve(false); }
  var prev=state.vouchers;
  var next=mutator(clone(state.vouchers));
  state.vouchers=next;
  state.syncStatus='syncing';
  render();
  var sha=state.sha, attempt=0;
  function attemptPut(){
    return ghPutFile(state.config, {vouchers:next}, sha, message).then(function(newSha){
      state.sha=newSha; state.syncStatus='synced'; state.lastSynced=Date.now();
      saveCache({vouchers:next}, newSha);
      render();
      return true;
    }).catch(function(err){
      if(err.conflict && attempt<1){
        attempt++;
        return ghGetFile(state.config).then(function(remote){ sha=remote.sha; return attemptPut(); });
      }
      state.vouchers=prev; state.syncStatus='error'; state.syncError=err.message||'Sync failed';
      showToast(state.syncError,'error');
      render();
      return false;
    });
  }
  return attemptPut();
}

/* ---------------- toast ---------------- */
var toastTimer=null;
function showToast(msg, type){
  var existing=document.querySelector('.toast'); if(existing) existing.remove();
  var el=document.createElement('div');
  el.className='toast'+(type==='error'?' error':'');
  el.textContent=msg;
  document.body.appendChild(el);
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){ el.remove(); }, 3200);
}

/* ---------------- rendering ---------------- */
var appEl;
function render(){
  var html='';
  if(state.view==='settings') html=renderSettings();
  else if(state.view==='addVoucher') html=renderVoucherForm(null);
  else if(state.view==='editVoucher') html=renderVoucherForm(getVoucher(state.editingVoucherId));
  else if(state.view==='detail') html=renderDetail();
  else html=renderDashboard();

  appEl.innerHTML=html;

  if(state.checkoutId){
    var v=getVoucher(state.checkoutId);
    if(v) appEl.insertAdjacentHTML('beforeend', renderCheckoutOverlay(v));
  }
  attachEvents();
}

function renderTopbar(title, showBack){
  var syncCls = state.syncStatus==='syncing'?'syncing':(state.syncStatus==='error'?'error':(state.syncStatus==='synced'?'synced':''));
  var syncLabel = state.syncStatus==='syncing' ? 'Syncing…' : (state.syncStatus==='error' ? 'Sync failed' : (state.lastSynced ? 'Synced '+relTime(state.lastSynced) : 'Not synced yet'));
  var left = showBack
    ? '<button class="icon-btn" data-action="go-dashboard" aria-label="Back">'+iconBack()+'</button>'
    : '<h1>'+escapeHtml(title)+'</h1>';
  return ''+
  '<div class="topbar">'+
    left+
    '<div class="topbar-actions">'+
      (state.config ? '<button class="icon-btn" data-action="refresh" aria-label="Refresh">'+iconRefresh()+'</button>' : '')+
      '<button class="icon-btn" data-action="go-settings" aria-label="Settings">'+iconSettings()+'</button>'+
    '</div>'+
  '</div>'+
  (state.view==='dashboard' ? '<div class="sync-row"><span class="sync-dot '+syncCls+'"></span><span>'+syncLabel+'</span></div>' : '');
}

function renderDashboard(){
  var totalRemaining=0, activeCount=0;
  state.vouchers.forEach(function(v){ var c=computeVoucher(v); if(c.status!=='EXPIRED'){ totalRemaining+=c.balance; activeCount++; } });

  var body;
  if(state.vouchers.length===0){
    body = '<div class="empty"><h2>No vouchers yet</h2><p>Add your first voucher — Coles, Myer, or anywhere else — with its barcode, PIN and value, to start tracking what\'s left on it.</p>'+
      '<button class="btn btn-primary" data-action="go-add">Add a voucher</button></div>';
  } else {
    var byStore={};
    state.vouchers.forEach(function(v){
      var key=voucherStore(v);
      if(!byStore[key]) byStore[key]=[];
      byStore[key].push(v);
    });
    var storeNames=Object.keys(byStore).sort(function(a,b){
      if(a==='Other') return 1;
      if(b==='Other') return -1;
      return a.localeCompare(b);
    });
    body = '<div class="summary">'+activeCount+' active · <b>'+fmtMoney(totalRemaining)+'</b> remaining</div>'+
      storeNames.map(function(name){
        var list=byStore[name].slice().sort(function(a,b){
          var ca=computeVoucher(a), cb=computeVoucher(b);
          var r=statusRank(ca.status)-statusRank(cb.status);
          if(r!==0) return r;
          return (b.updatedAt||0)-(a.updatedAt||0);
        });
        var groupRemaining=0, groupActive=0;
        list.forEach(function(v){ var c=computeVoucher(v); if(c.status!=='EXPIRED'){ groupRemaining+=c.balance; groupActive++; } });
        return '<div class="store-group">'+
          '<div class="store-group-header"><h3>'+escapeHtml(name)+'</h3><span class="sub tabular">'+groupActive+' active · '+fmtMoney(groupRemaining)+'</span></div>'+
          '<div class="list">'+list.map(renderVoucherCard).join('')+'</div>'+
        '</div>';
      }).join('');
  }

  return renderTopbar('Vouchers', false) + body +
    '<button class="fab" data-action="go-add" aria-label="Add voucher">'+iconPlus()+'</button>';
}

function renderVoucherCard(v){
  var c=computeVoucher(v);

    '<div class="vc-top">'+

/* ---------------- small helpers ---------------- */

function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
function escapeAttr(s){ return escapeHtml(s); }

function iconPlus(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>'; }

function iconRefresh(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>'; }

/* ---------------- events ---------------- */
function attachEvents(){
  appEl.querySelectorAll('[data-action]').forEach(function(el){
    el.addEventListener('click', function(){ handleAction(el.getAttribute('data-action'), el); });
  });
  var vForm=appEl.querySelector('[data-form="voucher"]');
  if(vForm) vForm.addEventListener('submit', onSubmitVoucherForm);
  var tForm=appEl.querySelector('[data-form="add-txn"]');
  if(tForm) tForm.addEventListener('submit', onSubmitTxnForm);
  var sForm=appEl.querySelector('[data-form="settings"]');
  if(sForm) sForm.addEventListener('submit', onSubmitSettingsForm);
  var photoFile=appEl.querySelector('#photoFile');
  if(photoFile) photoFile.addEventListener('change', onPhotoPicked);
}

function handleAction(action, el){
  var id=el.getAttribute('data-id');
  if(action==='go-dashboard'){ state.view='dashboard'; state.photoDraft=null; render(); }
  else if(action==='go-add'){ state.view='addVoucher'; state.photoDraft=null; render(); }
  else if(action==='go-settings'){ state.view='settings'; render(); }
  else if(action==='open-voucher'){ state.view='detail'; state.activeVoucherId=id; render(); }
  else if(action==='edit-voucher'){ state.view='editVoucher'; state.editingVoucherId=id; state.photoDraft=null; render(); }
  else if(action==='refresh'){ refreshFromRemote(false); }
  else if(action==='toggle-pin'){ state.pinRevealed[id]=!state.pinRevealed[id]; render(); }
  else if(action==='toggle-pin-checkout'){ state.pinRevealed['checkout_'+id]=!state.pinRevealed['checkout_'+id]; render(); }
  else if(action==='toggle-pin-input'){ var pi=document.getElementById('pinInput'); if(pi){ pi.type = pi.type==='password'?'text':'password'; } var btn=appEl.querySelector('[data-action="toggle-pin-input"]'); }
  else if(action==='toggle-token-input'){ var ti=document.getElementById('tokenInput'); if(ti){ ti.type = ti.type==='password'?'text':'password'; el.textContent = ti.type==='password' ? 'Show' : 'Hide'; } }
  else if(action==='toggle-advanced'){ state.showAdvanced=!state.showAdvanced; render(); }
  else if(action==='checkout'){ state.checkoutId=id; state.pinRevealed['checkout_'+id]=false; render(); }
  else if(action==='close-checkout'){ state.checkoutId=null; render(); }
  else if(action==='pick-photo'){ var pf=document.getElementById('photoFile'); if(pf) pf.click(); }
  else if(action==='delete-txn'){ onDeleteTxn(id, el.getAttribute('data-txn')); }
  else if(action==='delete-voucher'){ onDeleteVoucher(id); }
  else if(action==='forget-token'){ if(confirm('Remove the saved token from this phone? You can reconnect any time.')){ clearConfigLS(); state.config=null; state.vouchers=[]; state.sha=null; state.view='settings'; render(); } }
}

function onPhotoPicked(e){
  var file=e.target.files && e.target.files[0];
  if(!file) return;
  compressImage(file, 900, 0.72).then(function(dataUrl){
    state.photoDraft=dataUrl;
    render();
  }).catch(function(err){ showToast(err.message||'Could not process that photo.','error'); });
}

function onSubmitVoucherForm(e){
  e.preventDefault();
  var f=e.target;
  var id=f.getAttribute('data-id');
  var isEdit=!!id;
  var store=f.store.value.trim();
  var label=f.label.value.trim();
  var initialValue=round2(parseFloat(f.initialValue.value));
  var purchaseDate=f.purchaseDate.value;
  var pin=f.pin.value.trim();
  if(!store){ showToast('Enter which store this voucher is for.','error'); return; }
  if(!(initialValue>0)){ showToast('Enter a voucher value greater than 0.','error'); return; }
  if(!pin){ showToast('Enter the voucher PIN.','error'); return; }

  var photo = state.photoDraft!==null ? state.photoDraft : (isEdit ? (getVoucher(id)||{}).barcodeImage : null);

  persist(function(vouchers){
    if(isEdit){
      var v=vouchers.find(function(x){ return x.id===id; });
      if(v){ v.store=store; v.label=label; v.initialValue=initialValue; v.purchaseDate=purchaseDate; v.pin=pin; v.barcodeImage=photo||null; v.updatedAt=Date.now(); }
    } else {
      vouchers.push({ id:uid(), store:store, label:label, initialValue:initialValue, purchaseDate:purchaseDate, pin:pin, barcodeImage:photo||null, transactions:[], createdAt:Date.now(), updatedAt:Date.now() });
    }
    return vouchers;
  }, isEdit ? 'Edit voucher '+id : 'Add voucher').then(function(ok){
    if(ok){ state.photoDraft=null; state.view='dashboard'; showToast(isEdit?'Voucher updated.':'Voucher saved.'); render(); }
  });
}

function onSubmitTxnForm(e){
  e.preventDefault();
  var f=e.target;
  var id=f.getAttribute('data-id');
  var date=f.date.value;
  var amount=round2(parseFloat(f.amount.value));
  if(!(amount>0)){ showToast('Enter an amount greater than 0.','error'); return; }
  var v=getVoucher(id);
  if(v){
    var c=computeVoucher(v);
    if(amount>c.balance+0.0001 && !confirm('That\'s more than the remaining balance ('+fmtMoney(c.balance)+'). Add it anyway?')) return;
  }
  persist(function(vouchers){
    var vv=vouchers.find(function(x){ return x.id===id; });
    if(vv){ vv.transactions.push({id:uid(), date:date, amount:amount, ts:Date.now()}); vv.updatedAt=Date.now(); }
    return vouchers;
  }, 'Add transaction').then(function(ok){ if(ok){ showToast('Transaction added.'); render(); } });
}

function onDeleteTxn(voucherId, txnId){
  if(!confirm('Delete this transaction?')) return;
  persist(function(vouchers){
    var v=vouchers.find(function(x){ return x.id===voucherId; });
    if(v){ v.transactions=v.transactions.filter(function(t){ return t.id!==txnId; }); v.updatedAt=Date.now(); }
    return vouchers;
  }, 'Delete transaction').then(function(ok){ if(ok) showToast('Transaction deleted.'); });
}

function onDeleteVoucher(id){
  if(!confirm('Delete this voucher and its whole history? This can\'t be undone.')) return;
  persist(function(vouchers){ return vouchers.filter(function(v){ return v.id!==id; }); }, 'Delete voucher').then(function(ok){
    if(ok){ state.view='dashboard'; showToast('Voucher deleted.'); render(); }
  });
}

function onSubmitSettingsForm(e){
  e.preventDefault();
  var f=e.target;
  var cfg={
    owner:f.owner.value.trim(),
    repo:f.repo.value.trim(),
    path:(f.path.value||'vouchers.json').trim(),
    branch:(f.branch.value||'main').trim(),
    token:f.token.value.trim()
  };
  var btn=f.querySelector('button[type=submit]');
  btn.disabled=true; btn.textContent='Connecting…';
  ghGetFile(cfg).then(function(res){
    saveConfigLS(cfg);
    state.config=cfg;
    state.vouchers=res.data.vouchers||[];
    state.sha=res.sha;
    state.syncStatus='synced';
    state.lastSynced=Date.now();
    saveCache(res.data, res.sha);
    state.view='dashboard';
    showToast('Connected.');
    render();
  }).catch(function(err){
    showToast(err.message||'Could not connect.','error');
    btn.disabled=false; btn.textContent='Connect';
  });
}

/* ---------------- init ---------------- */
document.addEventListener('DOMContentLoaded', function(){
  appEl=document.getElementById('app');
  initialLoad();
});
document.addEventListener('visibilitychange', function(){
  if(!document.hidden && state.config) refreshFromRemote(true);
});

})();
</script>
</body>
</html>
