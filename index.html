<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#1F5C4A">
<meta name="robots" content="noindex, nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LG-Voucher-Tracker">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<title>LG-Voucher-Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
  :root{
    --color-bg:#F3F6F1;--color-paper:#FFFFFF;--color-ink:#1A1D1B;--color-ink-soft:#5B6660;
    --color-primary:#1F5C4A;--color-primary-dark:#153F33;--color-new:#4C6685;
    --color-inuse:#1F5C4A;--color-expired:#A24936;--color-border:#DEE4D9;--color-admin:#8B5C1A;
    --font-display:'Space Grotesk',sans-serif;--font-body:'Inter',sans-serif;--font-mono:'IBM Plex Mono',monospace;
    --radius:16px;--shadow:0 2px 10px rgba(20,30,25,0.07),0 1px 2px rgba(20,30,25,0.06);
    --safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--color-bg);color:var(--color-ink);font-family:var(--font-body);-webkit-font-smoothing:antialiased;}
  body{min-height:100vh;min-height:100dvh;}
  h1,h2,h3{font-family:var(--font-display);margin:0;letter-spacing:-0.01em;}
  p{margin:0;}
  button{font-family:inherit;cursor:pointer;}
  input,select{font-family:inherit;}
  .tabular{font-variant-numeric:tabular-nums;}
  ::selection{background:var(--color-primary);color:#fff;}
  #app{max-width:520px;margin:0 auto;padding-bottom:calc(96px + var(--safe-bottom));min-height:100vh;min-height:100dvh;position:relative;}
  .topbar{position:sticky;top:0;z-index:20;background:var(--color-bg);padding:calc(18px + var(--safe-top)) 20px 12px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .topbar h1{font-size:19px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .topbar-actions{display:flex;align-items:center;gap:6px;}
  .icon-btn{width:38px;height:38px;border-radius:11px;border:1px solid var(--color-border);background:var(--color-paper);display:flex;align-items:center;justify-content:center;color:var(--color-ink);box-shadow:var(--shadow);}
  .icon-btn:active{transform:scale(0.94);}
  .icon-btn svg{width:18px;height:18px;}
  .sync-row{display:flex;align-items:center;gap:6px;padding:0 20px 14px;font-family:var(--font-mono);font-size:11.5px;color:var(--color-ink-soft);}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--color-ink-soft);flex-shrink:0;}
  .sync-dot.live{background:var(--color-primary);animation:pulse 2s infinite ease-in-out;}
  .sync-dot.syncing{background:#C99A2E;animation:pulse 1s infinite ease-in-out;}
  .sync-dot.error{background:var(--color-expired);}
  .sync-dot.offline{background:var(--color-ink-soft);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}
  .admin-banner{margin:0 20px 12px;padding:10px 14px;background:#FEF3E2;border:1.5px solid #E0B868;border-radius:10px;font-family:var(--font-mono);font-size:11.5px;color:var(--color-admin);display:flex;align-items:center;gap:8px;font-weight:600;}
  .admin-banner svg{width:15px;height:15px;flex-shrink:0;}
  .summary{padding:0 20px 18px;font-size:13.5px;color:var(--color-ink-soft);}
  .summary b{color:var(--color-ink);font-family:var(--font-mono);font-weight:600;}
  .link-btn{border:none;background:none;padding:0;margin:0;color:var(--color-expired);font-family:var(--font-mono);font-size:12.5px;font-weight:600;text-decoration:underline;}
  .mode-switch{display:flex;gap:4px;margin:0 20px 18px;background:var(--color-paper);border:1px solid var(--color-border);border-radius:13px;padding:4px;box-shadow:var(--shadow);}
  .mode-btn{flex:1;border:none;background:transparent;padding:10px 2px;border-radius:10px;font-family:var(--font-body);font-weight:600;font-size:12.5px;color:var(--color-ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mode-btn.active{background:var(--color-primary);color:#fff;}
  .stat-row{display:flex;gap:12px;margin-bottom:18px;}
  .stat-tile{flex:1;background:var(--color-paper);border:1px solid var(--color-border);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;}
  .stat-tile .label{font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--color-ink-soft);margin-bottom:6px;}
  .stat-tile .value{font-family:var(--font-mono);font-weight:700;font-size:22px;color:var(--color-primary-dark);}
  .stat-tile .sub{font-size:11.5px;color:var(--color-ink-soft);margin-top:4px;}
  .card+.card{margin-top:16px;}
  .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;}
  .card-header h3{font-size:15px;font-weight:700;}
  .period-toggle{display:flex;gap:4px;background:var(--color-bg);border:1px solid var(--color-border);border-radius:10px;padding:3px;flex-shrink:0;}
  .period-btn{padding:6px 12px;border-radius:7px;font-size:12px;font-weight:600;color:var(--color-ink-soft);background:transparent;border:none;}
  .period-btn.active{background:var(--color-primary);color:#fff;}
  .chart-row{display:flex;align-items:flex-end;gap:6px;height:150px;position:relative;padding-top:32px;}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;position:relative;background:transparent;border:none;padding:0;}
  .bar-track{width:100%;display:flex;align-items:flex-end;justify-content:center;height:100%;position:relative;}
  .bar-fill{width:70%;background:var(--color-primary);border-radius:4px 4px 2px 2px;min-height:3px;}
  .bar-fill.is-peak{background:var(--color-primary-dark);}
  .bar-value-chip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--color-ink);color:#fff;font-family:var(--font-mono);font-size:11px;font-weight:600;padding:4px 8px;border-radius:6px;white-space:nowrap;box-shadow:var(--shadow);z-index:5;}
  .bar-value-chip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:var(--color-ink);}
  .bar-label{margin-top:8px;font-family:var(--font-mono);font-size:10px;color:var(--color-ink-soft);text-align:center;line-height:1.3;}
  .hint-note{font-size:12px;color:var(--color-ink-soft);line-height:1.5;margin-top:12px;}
  .store-bar-row{margin-bottom:12px;}
  .store-bar-row:last-child{margin-bottom:0;}
  .store-bar-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;font-size:13px;}
  .store-bar-top .name{font-weight:600;}
  .store-bar-top .amt{font-family:var(--font-mono);font-weight:600;color:var(--color-primary-dark);}
  .store-bar-track{height:8px;border-radius:4px;background:var(--color-bg);border:1px solid var(--color-border);overflow:hidden;}
  .store-bar-fill{height:100%;background:var(--color-primary);border-radius:4px;}
  .store-group{margin-bottom:8px;}
  .store-group-header{display:flex;align-items:baseline;justify-content:space-between;padding:16px 20px 10px;}
  .store-group-header h3{font-family:var(--font-display);font-size:15px;font-weight:700;}
  .store-group-header .sub{font-family:var(--font-mono);font-size:11px;color:var(--color-ink-soft);white-space:nowrap;}
  .vc-store{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--color-ink-soft);margin-bottom:3px;}
  .list{padding:0 20px;display:flex;flex-direction:column;gap:16px;}
  .voucher-card{background:var(--color-paper);border:1px solid var(--color-border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;position:relative;overflow:hidden;text-align:left;width:100%;}
  .voucher-card::before,.voucher-card::after{content:'';position:absolute;width:20px;height:20px;background:var(--color-bg);border-radius:50%;top:50%;transform:translateY(-50%);border:1px solid var(--color-border);}
  .voucher-card::before{left:-11px;}
  .voucher-card::after{right:-11px;}
  .vc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px;}
  .vc-label{font-family:var(--font-display);font-weight:600;font-size:15.5px;}
  .vc-sub{font-family:var(--font-mono);font-size:11.5px;color:var(--color-ink-soft);margin-top:2px;}
  .stamp{display:inline-block;padding:4px 9px;border-radius:5px;font-family:var(--font-mono);font-weight:700;font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;transform:rotate(-4deg);border:2px solid currentColor;white-space:nowrap;}
  .stamp.new{color:var(--color-new);}
  .stamp.inuse{color:var(--color-inuse);}
  .stamp.expired{color:var(--color-expired);}
  .vc-divider{border-top:2px dashed var(--color-border);margin:0 -20px 14px;}
  .vc-bottom{display:flex;justify-content:space-between;align-items:flex-end;}
  .vc-balance-label{font-size:11px;color:var(--color-ink-soft);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:2px;}
  .vc-balance{font-family:var(--font-mono);font-weight:700;font-size:30px;color:var(--color-primary-dark);}
  .voucher-card.is-expired .vc-balance{color:var(--color-ink-soft);}
  .vc-initial{font-family:var(--font-mono);font-size:12.5px;color:var(--color-ink-soft);}
  .manage-actions{display:flex;gap:10px;margin-top:14px;}
  .manage-actions .btn{flex:1;padding:10px 14px;font-size:13.5px;}
  .empty{margin:40px 20px;padding:34px 22px;background:var(--color-paper);border:1px dashed var(--color-border);border-radius:var(--radius);text-align:center;}
  .empty h2{font-size:17px;margin-bottom:8px;}
  .empty p{font-size:13.5px;color:var(--color-ink-soft);line-height:1.5;margin-bottom:18px;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:12px;border:none;padding:13px 18px;font-weight:600;font-size:14.5px;font-family:var(--font-body);}
  .btn-primary{background:var(--color-primary);color:#fff;}
  .btn-primary:active{background:var(--color-primary-dark);}
  .btn-secondary{background:var(--color-paper);color:var(--color-ink);border:1px solid var(--color-border);}
  .btn-danger{background:#fff;color:var(--color-expired);border:1px solid #E7C6BC;}
  .btn-block{width:100%;}
  .btn:disabled{opacity:0.55;}
  .screen{padding:4px 20px 40px;}
  .field{margin-bottom:18px;}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--color-ink-soft);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.4px;}
  .field input[type=text],.field input[type=number],.field input[type=date],.field input[type=password]{width:100%;padding:13px 14px;border-radius:11px;border:1px solid var(--color-border);background:var(--color-paper);font-size:16px;color:var(--color-ink);font-family:var(--font-mono);}
  .field input:focus{outline:2px solid var(--color-primary);outline-offset:1px;}
  .field .hint{font-size:12px;color:var(--color-ink-soft);margin-top:6px;font-family:var(--font-body);}
  .field-row{display:flex;gap:12px;}
  .field-row .field{flex:1;}
  .pin-wrap{position:relative;}
  .pin-toggle{position:absolute;right:8px;top:8px;bottom:8px;padding:0 10px;border:none;background:transparent;color:var(--color-primary);font-weight:600;font-size:12px;font-family:var(--font-body);}
  .photo-input{border:1.5px dashed var(--color-border);border-radius:12px;padding:16px;text-align:center;background:var(--color-paper);}
  .photo-input img{max-width:100%;max-height:200px;border-radius:8px;margin-bottom:10px;display:block;margin-left:auto;margin-right:auto;}
  .photo-input .pick-btn{margin-top:6px;}
  .form-actions{display:flex;gap:10px;margin-top:26px;}
  .back-row{display:flex;align-items:center;gap:8px;padding:14px 20px 6px;}
  .back-row .icon-btn{box-shadow:none;}
  .back-row h2{font-size:18px;}
  .barcode-frame{background:#fff;border:1px solid var(--color-border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);text-align:center;}
  .barcode-frame img{max-width:100%;max-height:150px;object-fit:contain;}
  .barcode-frame .tap-hint{font-size:11.5px;color:var(--color-ink-soft);margin-top:10px;}
  .detail-balance{text-align:center;margin:26px 0 22px;}
  .detail-balance .label{font-size:12px;text-transform:uppercase;letter-spacing:0.6px;color:var(--color-ink-soft);margin-bottom:4px;}
  .detail-balance .amount{font-family:var(--font-mono);font-weight:700;font-size:44px;color:var(--color-primary-dark);}
  .detail-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px dashed var(--color-border);font-size:14px;}
  .detail-row:last-child{border-bottom:none;}
  .detail-row .k{color:var(--color-ink-soft);}
  .detail-row .v{font-family:var(--font-mono);font-weight:600;}
  .ledger{margin-top:24px;}
  .ledger h3{font-size:13px;text-transform:uppercase;letter-spacing:0.5px;color:var(--color-ink-soft);margin-bottom:10px;}
  .ledger-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px dashed var(--color-border);gap:8px;}
  .ledger-row .date{font-family:var(--font-mono);font-size:13px;width:64px;flex-shrink:0;}
  .ledger-row .spent{font-family:var(--font-mono);font-size:13px;color:var(--color-expired);flex:1;}
  .ledger-row .after{font-family:var(--font-mono);font-size:13px;font-weight:600;text-align:right;width:78px;flex-shrink:0;}
  .ledger-row .del{border:none;background:transparent;color:var(--color-ink-soft);font-size:16px;padding:2px 6px;flex-shrink:0;}
  .ledger-empty{font-size:13px;color:var(--color-ink-soft);padding:14px 0;}
  .add-txn{margin-top:22px;background:var(--color-paper);border:1px solid var(--color-border);border-radius:var(--radius);padding:16px;}
  .add-txn h3{font-size:13px;text-transform:uppercase;letter-spacing:0.5px;color:var(--color-ink-soft);margin-bottom:12px;}
  .overlay{position:fixed;inset:0;background:#fff;z-index:100;display:flex;flex-direction:column;padding:calc(18px + var(--safe-top)) 22px calc(28px + var(--safe-bottom));}
  .overlay-close{align-self:flex-end;width:36px;height:36px;border-radius:50%;border:1px solid var(--color-border);background:#fff;display:flex;align-items:center;justify-content:center;}
  .overlay-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;}
  .overlay-body img{max-width:100%;max-height:38vh;object-fit:contain;}
  .overlay-label{font-family:var(--font-display);font-weight:600;font-size:16px;color:var(--color-ink);}
  .overlay-balance{font-family:var(--font-mono);font-weight:700;font-size:38px;color:var(--color-primary-dark);}
  .overlay-pin{display:flex;align-items:center;gap:10px;font-family:var(--font-mono);font-size:22px;letter-spacing:3px;}
  .overlay-pin button{border:1px solid var(--color-border);background:#fff;border-radius:8px;padding:6px 12px;font-size:12px;font-family:var(--font-body);color:var(--color-primary);}
  .card{background:var(--color-paper);border:1px solid var(--color-border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);}
  .lead{font-size:14px;color:var(--color-ink-soft);line-height:1.55;margin-bottom:20px;}
  .steps{margin:0 0 20px;padding:0;list-style:none;display:flex;flex-direction:column;gap:10px;}
  .steps li{display:flex;gap:10px;font-size:13.5px;color:var(--color-ink-soft);line-height:1.5;}
  .steps li b{color:var(--color-ink);font-family:var(--font-mono);}
  .toast{position:fixed;left:20px;right:20px;bottom:calc(24px + var(--safe-bottom));z-index:200;background:var(--color-ink);color:#fff;padding:13px 16px;border-radius:12px;font-size:13.5px;box-shadow:0 8px 24px rgba(0,0,0,0.25);animation:toast-in 0.18s ease-out;}
  .toast.error{background:var(--color-expired);}
  .toast.warning{background:var(--color-admin);}
  @keyframes toast-in{from{transform:translateY(8px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  @media (prefers-reduced-motion:reduce){*{animation-duration:0.001ms !important;}}
</style>

<body>
<div id="app"></div>
<script>
(function(){
'use strict';

var CONFIG_KEY='voucherFirebaseConfig_v1';

var state={
  mode:'use',view:'useDashboard',config:null,
  vouchers:[],deletedIds:{},
  activeVoucherId:null,editingVoucherId:null,photoDraft:null,
  syncStatus:'offline',lastSynced:null,checkoutId:null,pinRevealed:{}
};

var db=null, dataRef=null, unsubscribe=null;

function isAdmin(){ return window.location.hash==='#admin'||(new URLSearchParams(window.location.search)).get('admin')==='1'; }
function loadConfig(){ try{ var r=localStorage.getItem(CONFIG_KEY); return r?JSON.parse(r):null; }catch(e){ return null; } }
function saveConfigLS(cfg){ localStorage.setItem(CONFIG_KEY,JSON.stringify(cfg)); }
function clearConfigLS(){ localStorage.removeItem(CONFIG_KEY); }
function clone(x){ return typeof structuredClone==='function'?structuredClone(x):JSON.parse(JSON.stringify(x)); }

/* ---------------- domain ---------------- */
function round2(n){ return Math.round((Number(n)+Number.EPSILON)*100)/100; }
function uid(){ return crypto.randomUUID?crypto.randomUUID():'id-'+Date.now()+'-'+Math.random().toString(16).slice(2); }
function fmtMoney(n){ var v=round2(n); return '$'+v.toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(iso){ if(!iso) return ''; return new Date(iso+'T00:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'short'}); }
function relTime(ts){
  if(!ts) return 'never';
  var s=Math.floor((Date.now()-ts)/1000);
  if(s<10) return 'just now'; if(s<60) return s+'s ago';
  var m=Math.floor(s/60); if(m<60) return m+'m ago';
  var h=Math.floor(m/60); if(h<24) return h+'h ago';
  return Math.floor(h/24)+'d ago';
}
function getVoucher(id){ for(var i=0;i<state.vouchers.length;i++){ if(state.vouchers[i].id===id) return state.vouchers[i]; } return null; }
function voucherTitle(v){ return (v.label&&v.label.trim())?v.label.trim():'Voucher'; }
function voucherStore(v){ return (v.store&&v.store.trim())?v.store.trim():'Other'; }

/* THE FIX: always use (v.transactions||[]) — never v.transactions directly */
function computeVoucher(v){
  var txns=(v.transactions||[]).slice().sort(function(a,b){
    if(a.date===b.date) return (a.ts||0)-(b.ts||0);
    return a.date<b.date?-1:1;
  });
  var cumulative=0, withRunning=[];
  for(var i=0;i<txns.length;i++){
    cumulative=round2(cumulative+Number(txns[i].amount));
    withRunning.push({id:txns[i].id,date:txns[i].date,amount:Number(txns[i].amount),balanceAfter:round2(v.initialValue-cumulative)});
  }
  var balance=round2(v.initialValue-cumulative);
  var txnLen=(v.transactions||[]).length;  /* safe length check */
  var status=txnLen===0?'NEW':(balance<=0?'EXPIRED':'IN-USE');
  return {spent:cumulative,balance:balance,status:status,ledger:withRunning.slice().reverse()};
}
function statusRank(s){ return s==='IN-USE'?0:(s==='NEW'?1:2); }
function statusClass(s){ return s==='IN-USE'?'inuse':(s==='NEW'?'new':'expired'); }

/* ---------------- analytics ---------------- */
function allTransactionsFlat(){
  var out=[];
  state.vouchers.forEach(function(v){
    var store=voucherStore(v);
    (v.transactions||[]).forEach(function(t){ out.push({date:t.date,amount:Number(t.amount),store:store}); });
  });
  return out;
}
function parseISODate(iso){ return new Date(iso+'T00:00:00'); }
function addDays(d,n){ return new Date(d.getFullYear(),d.getMonth(),d.getDate()+n); }
function startOfWeek(d){ var day=(d.getDay()+6)%7; return new Date(d.getFullYear(),d.getMonth(),d.getDate()-day); }
function fmtShortDate(d){ return d.toLocaleDateString('en-AU',{day:'numeric',month:'short'}); }
function fmtWeekRange(s,e){ return fmtShortDate(s)+' \u2013 '+fmtShortDate(e); }
function fmtMonthLabel(d){ return d.toLocaleDateString('en-AU',{month:'short',year:'2-digit'}); }
function fmtMonthFull(d){ return d.toLocaleDateString('en-AU',{month:'long',year:'numeric'}); }
function buildWeekBuckets(n){
  var cs=startOfWeek(new Date()),buckets=[];
  for(var i=n-1;i>=0;i--){ var s=addDays(cs,-7*i),e=addDays(s,6); buckets.push({start:s,end:e,label:fmtShortDate(s),full:fmtWeekRange(s,e),total:0}); }
  return buckets;
}
function buildMonthBuckets(n){
  var today=new Date(),buckets=[];
  for(var i=n-1;i>=0;i--){ var d=new Date(today.getFullYear(),today.getMonth()-i,1),e=new Date(d.getFullYear(),d.getMonth()+1,0); buckets.push({start:d,end:e,label:fmtMonthLabel(d),full:fmtMonthFull(d),total:0}); }
  return buckets;
}
function fillBuckets(buckets,txns){
  txns.forEach(function(t){
    var d=parseISODate(t.date);
    for(var i=0;i<buckets.length;i++){
      if(d>=buckets[i].start&&d<=buckets[i].end){ buckets[i].total=round2(buckets[i].total+t.amount); break; }
    }
  });
  return buckets;
}
function storeBreakdownInRange(txns,rs,re){
  var map={};
  txns.forEach(function(t){ var d=parseISODate(t.date); if(d>=rs&&d<=re) map[t.store]=round2((map[t.store]||0)+t.amount); });
  return Object.keys(map).map(function(k){ return {store:k,total:map[k]}; }).sort(function(a,b){ return b.total-a.total; });
}

/* ---------------- image compression ---------------- */
function compressImage(file,maxWidth,quality){
  return new Promise(function(resolve,reject){
    var reader=new FileReader();
    reader.onerror=function(){ reject(new Error('Could not read that photo.')); };
    reader.onload=function(){
      var img=new Image();
      img.onerror=function(){ reject(new Error('Could not read that photo.')); };
      img.onload=function(){
        var scale=Math.min(1,maxWidth/img.width),w=Math.round(img.width*scale),h=Math.round(img.height*scale);
        var canvas=document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        var ctx=canvas.getContext('2d');
        ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h); ctx.drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ---------------- Firebase ---------------- */
function initFirebase(cfg){
  if(db) return;
  try{ firebase.initializeApp({apiKey:cfg.apiKey,authDomain:cfg.authDomain,databaseURL:cfg.databaseURL,projectId:cfg.projectId}); }catch(e){}
  db=firebase.database();
}

function startListening(cfg){
  if(unsubscribe){ unsubscribe(); unsubscribe=null; }
  var roomCode=cfg.roomCode.trim().toLowerCase().replace(/[^a-z0-9_-]/g,'');
  dataRef=db.ref('rooms/'+roomCode);

  firebase.auth().signInAnonymously().then(function(res){
    console.log('Firebase: auth ok', res.user.uid);
  }).catch(function(err){
    console.error('Firebase auth error:', err.code, err.message);
    showToast('Auth failed: '+err.message,'error');
  });

  var cb=dataRef.on('value',function(snap){
    var val=snap.val()||{};
    /* Normalise: ensure every voucher has a transactions array */
    state.vouchers=(val.vouchers||[]).filter(function(v){ return v&&v.id; }).map(function(v){
      v.transactions=v.transactions||[];
      return v;
    });
    state.deletedIds=val.deletedIds||{};
    state.syncStatus='live';
    state.lastSynced=Date.now();
    render();
  },function(err){
    state.syncStatus='error';
    showToast('Sync error: '+err.message,'error');
    render();
  });
  unsubscribe=function(){ dataRef.off('value',cb); };

  db.ref('.info/connected').on('value',function(snap){
    if(snap.val()===true){ if(state.syncStatus==='offline') state.syncStatus='live'; }
    else{ state.syncStatus='offline'; }
    render();
  });
}

function stripUndefined(obj){
  if(obj===undefined) return null;
  if(obj===null||typeof obj!=='object') return obj;
  if(Array.isArray(obj)) return obj.map(stripUndefined);
  var out={};
  Object.keys(obj).forEach(function(k){ out[k]=stripUndefined(obj[k]); });
  return out;
}

function writeToFirebase(vouchers,deletedIds){
  if(!dataRef){ showToast('Not connected to Firebase.','error'); return Promise.resolve(false); }
  if(!firebase.auth().currentUser){ showToast('Not authenticated — refresh and try again.','error'); return Promise.resolve(false); }
  state.syncStatus='syncing';
  render();
  var clean=stripUndefined(vouchers.map(function(v){
    var c=clone(v);
    c.transactions=c.transactions||[];
    return c;
  }));
  return dataRef.set({
    vouchers:clean,
    deletedIds:deletedIds||state.deletedIds||{},
    lastUpdated:firebase.database.ServerValue.TIMESTAMP
  }).then(function(){
    state.syncStatus='live';
    state.lastSynced=Date.now();
    render();
    return true;
  }).catch(function(err){
    console.error('Firebase write error:',err.code,err.message);
    state.syncStatus='error';
    showToast('Save failed: '+err.message,'error');
    render();
    return false;
  });
}

function persist(mutator,opts){
  opts=opts||{};
  var next=mutator(clone(state.vouchers));
  var dels=clone(state.deletedIds);
  if(opts.deletedId) dels[opts.deletedId]=true;
  if(opts.deletedIds) opts.deletedIds.forEach(function(id){ dels[id]=true; });
  state.vouchers=next;
  state.deletedIds=dels;
  render();
  return writeToFirebase(next,dels);
}

function initialLoad(){
  state.config=loadConfig();
  if(!state.config){ state.view='settings'; render(); return; }
  initFirebase(state.config);
  startListening(state.config);
  render();
}

/* ---------------- toast ---------------- */
var toastTimer=null;
function showToast(msg,type){
  var ex=document.querySelector('.toast'); if(ex) ex.remove();
  var el=document.createElement('div');
  el.className='toast'+(type==='error'?' error':type==='warning'?' warning':'');
  el.textContent=msg;
  document.body.appendChild(el);
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){ el.remove(); },3800);
}

  var connected=!!state.config, admin=isAdmin();
  return renderTopbar('',connected)+
  '<div class="back-row" style="'+(connected?'':'padding-top:calc(18px + var(--safe-top));')+'"><h2>'+(connected?'Settings':'Connect to Firebase')+'</h2></div>'+
  '<div class="screen">'+
    (connected?'':
      '<p class="lead">This app uses Firebase Realtime Database to sync vouchers instantly between phones. Setup takes about 5 minutes.</p>'+
      '<ul class="steps">'+
        '<li><b>1.</b> Go to <b>console.firebase.google.com</b> \u2192 Create a new project (disable Analytics).</li>'+
        '<li><b>2.</b> Click the <b>&lt;/&gt;</b> web icon \u2192 register an app \u2192 copy the 4 config values below.</li>'+
        '<li><b>3.</b> Left sidebar \u2192 <b>Build \u2192 Realtime Database</b> \u2192 Create Database \u2192 test mode \u2192 then paste these rules in the Rules tab:</li>'+
      '</ul>'+
      '<div style="background:var(--color-ink);color:#c6e0d0;padding:12px 14px;border-radius:10px;font-family:var(--font-mono);font-size:11.5px;line-height:1.6;margin-bottom:20px;overflow-x:auto;white-space:pre;">{\n  "rules": {\n    "rooms": {\n      "$roomId": {\n        ".read": "auth != null",\n        ".write": "auth != null"\n      }\n    }\n  }\n}</div>'+
      '<ul class="steps">'+
        '<li><b>4.</b> Left sidebar \u2192 <b>Build \u2192 Authentication</b> \u2192 Get started \u2192 enable <b>Anonymous</b>.</li>'+
        '<li><b>5.</b> Pick a room code (any word) and enter the same one on both phones.</li>'+
      '</ul>')+
    '<form data-form="settings">'+
      '<div class="field"><label>API key</label><input type="text" name="apiKey" value="'+escapeAttr(cfg.apiKey)+'" placeholder="AIza\u2026" style="font-family:var(--font-body);" required></div>'+
      '<div class="field"><label>Auth domain</label><input type="text" name="authDomain" value="'+escapeAttr(cfg.authDomain)+'" placeholder="your-project.firebaseapp.com" style="font-family:var(--font-body);" required></div>'+
      '<div class="field"><label>Database URL</label><input type="text" name="databaseURL" value="'+escapeAttr(cfg.databaseURL)+'" placeholder="https://your-project-default-rtdb.firebaseio.com" style="font-family:var(--font-body);" required></div>'+
      '<div class="field"><label>Project ID</label><input type="text" name="projectId" value="'+escapeAttr(cfg.projectId)+'" placeholder="your-project-id" style="font-family:var(--font-body);" required></div>'+
      '<div class="field"><label>Room code</label><input type="text" name="roomCode" value="'+escapeAttr(cfg.roomCode)+'" placeholder="e.g. our-vouchers" style="font-family:var(--font-body);" required><div class="hint">Both phones must use the same room code.</div></div>'+
      '<div class="form-actions"><button class="btn btn-primary btn-block" type="submit">'+(connected?'Save & reconnect':'Connect')+'</button></div>'+
    '</form>'+
    (connected?'<div class="form-actions" style="margin-top:16px;"><button class="btn btn-danger btn-block" data-action="disconnect">Disconnect from Firebase</button></div>':'')+
    (!admin?'<div style="margin-top:28px;padding:16px;border:1px dashed var(--color-border);border-radius:var(--radius);font-size:12.5px;color:var(--color-ink-soft);line-height:1.55;"><b style="color:var(--color-ink);">Need to delete vouchers?</b><br>Open this app with <code style="font-family:var(--font-mono);background:var(--color-bg);padding:2px 6px;border-radius:4px;">#admin</code> at the end of the URL.</div>':'')+
  '</div>';
}

/* ---------------- helpers ---------------- */
function todayISO(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
function escapeAttr(s){ return escapeHtml(s); }
function iconSettings(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>'; }
function iconBack(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>'; }
function iconClose(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>'; }

/* ---------------- events ---------------- */
function attachEvents(){
  appEl.querySelectorAll('[data-action]').forEach(function(el){
    el.addEventListener('click',function(){ handleAction(el.getAttribute('data-action'),el); });
  });
  var vf=appEl.querySelector('[data-form="voucher"]'); if(vf) vf.addEventListener('submit',onSubmitVoucherForm);
  var tf=appEl.querySelector('[data-form="add-txn"]'); if(tf) tf.addEventListener('submit',onSubmitTxnForm);
  var sf=appEl.querySelector('[data-form="settings"]'); if(sf) sf.addEventListener('submit',onSubmitSettingsForm);
  var pf=appEl.querySelector('#photoFile'); if(pf) pf.addEventListener('change',onPhotoPicked);
}

function handleAction(action,el){
  var id=el.getAttribute('data-id');
  if(action==='go-home'){ goHome(); state.photoDraft=null; render(); }
  else if(action==='set-mode'){ state.mode=el.getAttribute('data-mode'); goHome(); state.photoDraft=null; render(); }
  else if(action==='go-add-form'){ state.view='addForm'; state.photoDraft=null; render(); }
  else if(action==='go-settings'){ state.view='settings'; render(); }
  else if(action==='open-voucher'){ state.view='useDetail'; state.activeVoucherId=id; render(); }
  else if(action==='edit-voucher'){ state.view='manageEdit'; state.editingVoucherId=id; state.photoDraft=null; render(); }
  else if(action==='toggle-pin'){ state.pinRevealed[id]=!state.pinRevealed[id]; render(); }
  else if(action==='toggle-pin-checkout'){ state.pinRevealed['checkout_'+id]=!state.pinRevealed['checkout_'+id]; render(); }
  else if(action==='toggle-pin-input'){ var pi=document.getElementById('pinInput'); if(pi) pi.type=pi.type==='password'?'text':'password'; }
  else if(action==='checkout'){ state.checkoutId=id; state.pinRevealed['checkout_'+id]=false; render(); }
  else if(action==='close-checkout'){ state.checkoutId=null; render(); }
  else if(action==='pick-photo'){ var ph=document.getElementById('photoFile'); if(ph) ph.click(); }
  else if(action==='delete-txn'){ if(!isAdmin()){ showToast('Delete requires admin mode.','error'); return; } onDeleteTxn(id,el.getAttribute('data-txn')); }
  else if(action==='delete-voucher'){ if(!isAdmin()){ showToast('Delete requires admin mode.','error'); return; } onDeleteVoucher(id); }
  else if(action==='clear-expired'){ if(!isAdmin()){ showToast('Delete requires admin mode.','error'); return; } onClearExpired(); }
  else if(action==='disconnect'){
    if(confirm('Disconnect from Firebase? Config will be cleared from this phone.')){
      if(unsubscribe){ unsubscribe(); unsubscribe=null; }
      clearConfigLS(); state.config=null; state.vouchers=[]; state.deletedIds={}; state.syncStatus='offline'; state.view='settings'; render();
    }
  }
  else if(action==='set-period'){ state.summaryPeriod=el.getAttribute('data-period'); state.summaryRevealIndex=null; render(); }
  else if(action==='toggle-bar-value'){ var idx=Number(el.getAttribute('data-idx')); state.summaryRevealIndex=state.summaryRevealIndex===idx?null:idx; render(); }
}

function onPhotoPicked(e){
  var file=e.target.files&&e.target.files[0]; if(!file) return;
  compressImage(file,900,0.72).then(function(d){ state.photoDraft=d; render(); }).catch(function(err){ showToast(err.message||'Could not process that photo.','error'); });
}

function onSubmitVoucherForm(e){
  e.preventDefault();
  var f=e.target, id=f.getAttribute('data-id'), isEdit=!!id;
  var store=f.store.value.trim(), label=f.label.value.trim();
  var initialValue=round2(parseFloat(f.initialValue.value)), purchaseDate=f.purchaseDate.value, pin=f.pin.value.trim();
  if(!store){ showToast('Enter which store this voucher is for.','error'); return; }
  if(!(initialValue>0)){ showToast('Enter a voucher value greater than 0.','error'); return; }
  if(!pin){ showToast('Enter the voucher PIN.','error'); return; }
  var photo=state.photoDraft!==null?state.photoDraft:(isEdit?(getVoucher(id)||{}).barcodeImage:null);
  persist(function(vouchers){
    if(isEdit){
      var v=vouchers.find(function(x){ return x.id===id; });
      if(v){ v.store=store; v.label=label; v.initialValue=initialValue; v.purchaseDate=purchaseDate; v.pin=pin; v.barcodeImage=photo||null; v.updatedAt=Date.now(); }
    } else {
      vouchers.push({id:uid(),store:store,label:label,initialValue:initialValue,purchaseDate:purchaseDate,pin:pin,barcodeImage:photo||null,transactions:[],createdAt:Date.now(),updatedAt:Date.now()});
    }
    return vouchers;
  }).then(function(ok){ if(ok){ state.photoDraft=null; goHome(); showToast(isEdit?'Voucher updated.':'Voucher saved.'); render(); } });
}

function onSubmitTxnForm(e){
  e.preventDefault();
  var f=e.target, id=f.getAttribute('data-id'), date=f.date.value;
  var amount=round2(parseFloat(f.amount.value));
  if(!(amount>0)){ showToast('Enter an amount greater than 0.','error'); return; }
  var v=getVoucher(id);
  if(v){ var c=computeVoucher(v); if(amount>c.balance+0.0001&&!confirm('That\'s more than the remaining balance ('+fmtMoney(c.balance)+'). Add it anyway?')) return; }
  persist(function(vouchers){
    var vv=vouchers.find(function(x){ return x.id===id; });
    if(vv){ vv.transactions=vv.transactions||[]; vv.transactions.push({id:uid(),date:date,amount:amount,ts:Date.now()}); vv.updatedAt=Date.now(); }
    return vouchers;
  }).then(function(ok){ if(ok){ showToast('Transaction added.'); render(); } });
}

function onDeleteTxn(voucherId,txnId){
  if(!confirm('Delete this transaction?')) return;
  persist(function(vouchers){
    var v=vouchers.find(function(x){ return x.id===voucherId; });
    if(v){ v.transactions=(v.transactions||[]).filter(function(t){ return t.id!==txnId; }); v.updatedAt=Date.now(); }
    return vouchers;
  }).then(function(ok){ if(ok) showToast('Transaction deleted.'); });
}

function onDeleteVoucher(id){
  if(!confirm('Delete this voucher and its whole history? This can\'t be undone.')) return;
  persist(function(vouchers){ return vouchers.filter(function(v){ return v.id!==id; }); },{deletedId:id}).then(function(ok){
    if(ok){ goHome(); showToast('Voucher deleted.'); render(); }
  });
}

function onClearExpired(){
  var expired=state.vouchers.filter(function(v){ return computeVoucher(v).status==='EXPIRED'; });
  if(expired.length===0) return;
  var n=expired.length, ids=expired.map(function(v){ return v.id; });
  if(!confirm('Delete '+n+' expired voucher'+(n>1?'s':'')+'? This can\'t be undone.')) return;
  persist(function(vouchers){ return vouchers.filter(function(v){ return computeVoucher(v).status!=='EXPIRED'; }); },{deletedIds:ids}).then(function(ok){
    if(ok){ showToast('Cleared '+n+' expired voucher'+(n>1?'s':'')+'.'); render(); }
  });
}

function onSubmitSettingsForm(e){
  e.preventDefault();
  var f=e.target;
  var cfg={apiKey:f.apiKey.value.trim(),authDomain:f.authDomain.value.trim(),databaseURL:f.databaseURL.value.trim(),projectId:f.projectId.value.trim(),roomCode:f.roomCode.value.trim()};
  if(!cfg.roomCode){ showToast('Enter a room code.','error'); return; }
  var btn=f.querySelector('button[type=submit]');
  btn.disabled=true; btn.textContent='Connecting\u2026';
  try{
    initFirebase(cfg);
    saveConfigLS(cfg);
    state.config=cfg;
    startListening(cfg);
    setTimeout(function(){ goHome(); showToast('Connected \u2014 syncing in real time.'); render(); },1500);
  }catch(err){
    showToast(err.message||'Could not connect.','error');
    btn.disabled=false; btn.textContent='Connect';
  }
}

document.addEventListener('DOMContentLoaded',function(){ appEl=document.getElementById('app'); initialLoad(); });

})();
</script>
